<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目管理 — 建筑空间绩效评价平台</title>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  var a = localStorage.getItem('accentColor') || '#0ea5e9';
  var m = a.match(/^#([0-9a-f]{6})$/i);
  if(m){
    var r=parseInt(m[1].slice(0,2),16), g=parseInt(m[1].slice(2,4),16), b=parseInt(m[1].slice(4,6),16);
    document.documentElement.style.setProperty('--accent', a);
    document.documentElement.style.setProperty('--accent-rgb', r+','+g+','+b);
  }
})();
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #0ea5e9;
  --accent-rgb: 14,165,233;
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
}

[data-theme="light"] {
  --bg: #f4f7fb;
  --bg-card: #ffffff;
  --border: #e2e8f0;
  --text-primary: #0f172a;
  --text-secondary: #64748b;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg: #0f1117;
  --bg-card: #161b27;
  --border: #2a2f45;
  --text-primary: #e8eaf0;
  --text-secondary: #8b90a8;
  --shadow: 0 4px 24px rgba(0,0,0,0.45);
}

body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 导航下拉 */
.topnav-wrap { position: relative; }
.topnav-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
  font-size: 13px; font-weight: 500; color: var(--text-primary);
}
.topnav-btn:hover { border-color: var(--accent); color: var(--accent); }
.topnav-caret { transition: transform 0.2s; flex-shrink: 0; }
.topnav-wrap.open .topnav-caret { transform: rotate(180deg); }
.topnav-dropdown {
  display: none;
  position: absolute; top: calc(100% + 6px); left: 0;
  min-width: 200px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 8px 28px rgba(0,0,0,0.14);
  padding: 6px 0; z-index: 999;
}
.topnav-wrap.open .topnav-dropdown { display: block; }
.topnav-section-label {
  padding: 7px 14px 3px;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  color: var(--text-secondary); text-transform: uppercase; opacity: 0.6;
}
.topnav-item {
  display: flex; align-items: center; gap: 8px; width: 100%;
  padding: 7px 16px;
  font-size: 13px; color: var(--text-secondary);
  background: transparent; border: none; cursor: pointer;
  text-decoration: none; transition: all 0.12s;
}
.topnav-item:hover { background: var(--bg); color: var(--text-primary); }
.topnav-item-current { color: var(--accent) !important; font-weight: 500; opacity: 0.75; }
.topbar-left { display: flex; align-items: center; gap: 8px; }
.topbar {
  width: 100%;
  padding: 0 40px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 10;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
}

.topbar-logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent), #0284c7);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.topbar-logo-icon svg { width: 18px; height: 18px; color: #fff; }

.topbar-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.icon-btn {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.icon-btn:hover { background: var(--bg); color: var(--text-primary); }

/* ── 主体 ── */
.page {
  width: 100%;
  max-width: 960px;
  padding: 60px 24px 80px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.page-head {
  text-align: center;
  margin-bottom: 56px;
}

.page-head-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.page-head h1 {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 12px;
}

.page-head p {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.7;
}

/* ── 操作卡片网格 ── */
.action-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  width: 100%;
  max-width: 720px;
}

.action-card {
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  color: inherit;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

.action-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), rgba(var(--accent-rgb),0.3));
  opacity: 0;
  transition: opacity 0.2s;
}

.action-card:hover {
  border-color: var(--accent);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(var(--accent-rgb), 0.18);
}

.action-card:hover::before { opacity: 1; }

.card-icon {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  background: rgba(var(--accent-rgb), 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  transition: background 0.2s;
}

.action-card:hover .card-icon {
  background: rgba(var(--accent-rgb), 0.18);
}

.card-icon svg { width: 26px; height: 26px; color: var(--accent); }

.card-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}

.card-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.card-arrow {
  position: absolute;
  bottom: 28px;
  right: 28px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(var(--accent-rgb), 0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.action-card:hover .card-arrow {
  background: var(--accent);
}

.card-arrow svg { width: 14px; height: 14px; color: var(--accent); transition: color 0.2s; }
.action-card:hover .card-arrow svg { color: #fff; }
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-left">
    <!-- 导航下拉 -->
    <div class="topnav-wrap" id="topnav-wrap">
      <button class="topnav-btn" onclick="toggleTopNav()" title="页面导航">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        导航
        <svg class="topnav-caret" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="topnav-dropdown" id="topnav-dropdown">
        <div class="topnav-section-label">工作流程</div>
        <a class="topnav-item" href="/">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
          封面
        </a>
        <a class="topnav-item" href="/select_module">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          模块选择
        </a>
        <div class="topnav-item topnav-item-current" style="cursor:default">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg>
          项目管理
        </div>
        <a class="topnav-item" href="/new_project">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          数据导入
        </a>
      </div>
    </div>
  </div>
  <a class="topbar-logo" href="/">
    <div class="topbar-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <span class="topbar-title">建筑空间绩效评价平台</span>
  </a>
  <div class="topbar-right">
    <button class="icon-btn" id="theme-toggle" title="切换明暗">
      <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16" style="display:none">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
      </svg>
    </button>
  </div>
</nav>

<main class="page">
  <div class="page-head">
    <div class="page-head-label">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor"><circle cx="6" cy="6" r="6"/></svg>
      PROJECT MANAGEMENT
    </div>
    <h1>项目管理</h1>
    <p>创建新的评价项目，或查看历史项目记录</p>
  </div>

  <div class="action-grid">
    <!-- 新建项目 -->
    <a class="action-card" href="/new_project">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="9"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </div>
      <div class="card-title">新建项目</div>
      <div class="card-desc">选择建筑类型，导入数据文件，<br>启动全量指标计算</div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </div>
    </a>

    <!-- 历史项目 -->
    <a class="action-card" href="/history">
      <div class="card-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div class="card-title">历史项目</div>
      <div class="card-desc">查看已计算完成的历史项目，<br>支持结果查看、另存为和删除</div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </div>
    </a>
  </div>
</main>

<script>
(function(){
  var btn = document.getElementById('theme-toggle');
  var sun = document.getElementById('icon-sun');
  var moon = document.getElementById('icon-moon');
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    sun.style.display  = t === 'dark'  ? 'none'  : '';
    moon.style.display = t === 'light' ? 'none'  : '';
  }
  applyTheme(localStorage.getItem('theme') || 'light');
  btn.addEventListener('click', function(){
    var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    applyTheme(next);
  });
})();

function toggleTopNav() {
  document.getElementById('topnav-wrap').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  var wrap = document.getElementById('topnav-wrap');
  if (wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
});
</script>
</body>
</html>
