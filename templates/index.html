<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建筑空间绩效评价平台</title>
<!-- 最早注入主题，避免 CSS 加载后出现闪烁 -->
<script>
(function(){
  var t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  var a = localStorage.getItem('accentColor') || '#0ea5e9';
  var m = a.match(/^#([0-9a-f]{6})$/i);
  if(m){
    var r=parseInt(m[1].slice(0,2),16), g=parseInt(m[1].slice(2,4),16), b=parseInt(m[1].slice(4,6),16);
    document.documentElement.style.setProperty('--accent', a);
    document.documentElement.style.setProperty('--accent-rgb', r+','+g+','+b);
  }
})();
</script>
<link rel="stylesheet" href="/static/css/app.css">
<style>
/* ─── 结果卡片网格 ─── */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
  gap: 20px;
  padding: 0 0 40px;
}

.metric-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s, transform 0.2s;
}

.metric-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(var(--accent-rgb),0.12);
}

/* 指标卡头部 */
.metric-card-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-dim);
  gap: 10px;
}

.metric-card-title-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.metric-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 5px;
  background: rgba(var(--accent-rgb),0.12);
  color: var(--accent);
  flex-shrink: 0;
  letter-spacing: 0.5px;
}

.metric-card-title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 源文件按钮 */
.source-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.15s;
}
.source-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(var(--accent-rgb),0.06);
}
.source-btn svg { flex-shrink: 0; }

/* 指标卡内容区（图 + 统计） */
.metric-card-body {
  padding: 14px 16px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.metric-img-wrap {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--bg-deep);
  border-radius: var(--radius-sm);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.metric-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: none;
}

.metric-img-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--text-dim);
}
.metric-img-placeholder svg { width: 32px; height: 32px; opacity: 0.4; }
.metric-img-placeholder span { font-size: 12px; opacity: 0.6; }

.metric-stats {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.metric-stat {
  flex: 1;
  min-width: 80px;
  background: var(--bg-deep);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}
.metric-stat-label { font-size: 10px; color: var(--text-dim); margin-bottom: 3px; }
.metric-stat-value { font-size: 15px; font-weight: 700; }
.metric-stat-value .unit { font-size: 11px; font-weight: 400; color: var(--text-secondary); margin-left: 2px; }

/* 状态标记 */
.metric-status {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 20px;
  font-weight: 500;
  align-self: flex-start;
}
.metric-status.pending {
  background: var(--bg-deep);
  color: var(--text-dim);
}
.metric-status.pending::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
}
.metric-status.done {
  background: rgba(0,201,167,0.1);
  color: var(--teal);
}
.metric-status.done::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--teal);
}
.metric-status.error {
  background: rgba(255,94,94,0.1);
  color: var(--red);
}
.metric-status.error::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--red);
}

/* 全屏 loading 遮罩 */
.loading-overlay { display: none; }
.loading-overlay.show { display: flex; }

/* 隐藏原有上传区 */
.upload-section { display: none !important; }
</style>
</head>

<script src="/static/js/app.js"></script>
<script>
// ─── 结果页额外逻辑 ───
// 所有指标定义（从 app.js VIEWS 复用）

// 指标分组顺序
const METRIC_ORDER = [
  { id: 'heatmap',      badge: 'A1' },
  { id: 'usetime',      badge: 'A2' },
  { id: 'speed',        badge: 'A3' },
  { id: 'duration',     badge: 'A4' },
  { id: 'cluster',      badge: 'A5' },
  { id: 'density',      badge: 'A6' },
  { id: 'openness',     badge: 'A7' },
  { id: 'topology',     badge: 'A8' },
  { id: 'difference',   badge: 'A9' },
  { id: 'trajectory',   badge: 'A10' },
  { id: 'environment',  badge: 'B5' },
  { id: 'behavior_count',    badge: 'C1' },
  { id: 'behavior_duration', badge: 'C2' },
  { id: 'behavior_rate',     badge: 'C3' },
  { id: 'behavior_entropy',  badge: 'C4' },
  { id: 'utilization',       badge: 'C5' },
  { id: 'satisfaction',      badge: 'D3' },
  { id: 'satisfaction_region', badge: 'D4' },
];

// 每个指标对应的「源文件」说明
const SOURCE_FILE_LABEL = {
  img:      '平面图',
  loc:      '定位数据',
  behavior: '行为数据',
  env:      '环境数据',
  ques:     '问卷数据',
  region:   '区域坐标',
};

// 指标 → 主要源文件类型
const METRIC_SOURCE = {
  heatmap:           ['img', 'loc'],
  usetime:           ['img', 'loc'],
  speed:             ['img', 'loc'],
  duration:          ['img', 'loc'],
  cluster:           ['img', 'loc'],
  density:           ['img', 'loc'],
  openness:          ['img', 'loc', 'region'],
  topology:          ['loc'],
  difference:        ['img', 'loc'],
  trajectory:        ['img', 'loc'],
  environment:       ['img', 'env'],
  behavior_count:    ['img', 'behavior'],
  behavior_duration: ['img', 'behavior'],
  behavior_rate:     ['behavior'],
  behavior_entropy:  ['behavior'],
  utilization:       ['behavior', 'region'],
  satisfaction:      ['ques'],
  satisfaction_region: ['ques'],
};

// 已存储的结果（指标id → data）
const _results = {};

function buildResultsGrid() {
  const grid = document.getElementById('results-grid');
  grid.innerHTML = '';

  METRIC_ORDER.forEach(function(m) {
    const cfg = VIEWS[m.id];
    if (!cfg) return;
    const card = document.createElement('div');
    card.className = 'metric-card';
    card.id = 'card-' + m.id;

    // 源文件按钮
    const sources = METRIC_SOURCE[m.id] || [];
    const sourceBtns = sources.map(function(s) {
      return `<button class="source-btn" onclick="openSourceFile('${m.id}','${s}')" title="查看${SOURCE_FILE_LABEL[s]}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        ${SOURCE_FILE_LABEL[s]}
      </button>`;
    }).join('');

    card.innerHTML = `
      <div class="metric-card-header">
        <div class="metric-card-title-wrap">
          <span class="metric-badge">${m.badge}</span>
          <span class="metric-card-title">${cfg.title}</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">${sourceBtns}</div>
      </div>
      <div class="metric-card-body">
        <div class="metric-img-wrap" id="img-wrap-${m.id}">
          <img id="result-img-${m.id}" src="" alt="${cfg.title}">
          <div class="metric-img-placeholder" id="placeholder-${m.id}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span>等待数据</span>
          </div>
        </div>
        <div class="metric-stats" id="stats-${m.id}"></div>
        <div class="metric-status pending" id="status-${m.id}">等待计算</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// 侧边栏导航 → 滚动到对应卡片
function bindSidebarAnchors() {
  document.querySelectorAll('.nav-item[data-anchor]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.nav-item').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      var target = document.getElementById(btn.dataset.anchor);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

// 打开源文件（占位，未来接入桌面文件管理器）
function openSourceFile(metricId, sourceType) {
  showToast('源文件：' + SOURCE_FILE_LABEL[sourceType] + ' （' + metricId + '）\n文件管理功能待开发', 'info');
}

// 渲染单个指标结果到卡片
function renderMetricCard(id, data) {
  _results[id] = data;
  const cfg = VIEWS[id];
  if (!cfg) return;

  // 图片
  const img = document.getElementById('result-img-' + id);
  const placeholder = document.getElementById('placeholder-' + id);
  if (data.image) {
    img.src = 'data:image/png;base64,' + data.image;
    img.style.display = 'block';
    if (placeholder) placeholder.style.display = 'none';
  }

  // 统计
  const statsEl = document.getElementById('stats-' + id);
  if (statsEl && data.summary) {
    statsEl.innerHTML = '';
    (cfg.stats || []).forEach(function(s) {
      var val = data.summary[s.key] ?? '—';
      statsEl.insertAdjacentHTML('beforeend',
        `<div class="metric-stat ${s.cls}">
           <div class="metric-stat-label">${s.label}</div>
           <div class="metric-stat-value">${val}<span class="unit">${s.unit}</span></div>
         </div>`);
    });
  }

  // 状态
  var statusEl = document.getElementById('status-' + id);
  if (statusEl) {
    statusEl.className = 'metric-status done';
    statusEl.textContent = '计算完成';
  }
}

function markMetricError(id, msg) {
  var statusEl = document.getElementById('status-' + id);
  if (statusEl) {
    statusEl.className = 'metric-status error';
    statusEl.textContent = '⚠ ' + (msg || '计算失败');
  }
}

// 引擎就绪后更新顶栏状态
function onEngineReady() {
  document.getElementById('status-dot').className = 'status-dot online';
  document.getElementById('status-text').textContent = '系统就绪';
}

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  buildResultsGrid();
  bindSidebarAnchors();
  bindThemeToggle();
  bindColorSettings();
  restoreAccentColor();
  // 轮询引擎就绪
  pollEngineReady();
});

function pollEngineReady() {
  fetch('/api/ready')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ready) { onEngineReady(); }
      else { setTimeout(pollEngineReady, 800); }
    })
    .catch(function(){ setTimeout(pollEngineReady, 1000); });
}
</script>
