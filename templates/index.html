<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建筑空间绩效评价平台</title>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  var a = localStorage.getItem('accentColor') || '#0ea5e9';
  var m = a.match(/^#([0-9a-f]{6})$/i);
  if(m){
    var r=parseInt(m[1].slice(0,2),16), g=parseInt(m[1].slice(2,4),16), b=parseInt(m[1].slice(4,6),16);
    document.documentElement.style.setProperty('--accent', a);
    document.documentElement.style.setProperty('--accent-rgb', r+','+g+','+b);
  }
})();
</script>
<link rel="stylesheet" href="/static/css/app.css">
<style>
/* ─── 单指标结果面板覆盖样式 ─── */

/* 隐藏旧的上传区 */
.upload-section { display: none !important; }

/* 结果内容区 */
.result-panel {
  display: none;
  flex-direction: column;
  gap: 20px;
  padding: 0 0 40px;
}
.result-panel.active { display: flex; }

/* 面板顶部 */
.result-panel-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.result-panel-title-group {}
.result-panel-badge {
  display: inline-block;
  font-size: 11px; font-weight: 700;
  padding: 2px 9px; border-radius: 5px;
  background: rgba(var(--accent-rgb),0.12); color: var(--accent);
  margin-bottom: 6px; letter-spacing: 0.5px;
}
.result-panel-title {
  font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 4px;
}
.result-panel-subtitle {
  font-size: 13px; color: var(--text-secondary);
}

/* 源文件标签 */
.source-file-bar {
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-top: 6px;
}
.source-label { font-size: 11px; color: var(--text-dim); }
.source-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 500;
  padding: 5px 11px;
  border: 1px solid var(--border); border-radius: 6px;
  background: transparent; color: var(--text-secondary);
  cursor: default; white-space: nowrap; transition: all 0.15s;
  max-width: 220px; overflow: hidden; text-overflow: ellipsis;
}
.source-btn.clickable {
  cursor: pointer;
}
.source-btn.clickable:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(var(--accent-rgb, 14, 165, 233), 0.06);
}
.source-btn svg { flex-shrink: 0; }

/* 图表容器 */
.result-chart-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.result-chart-wrap img {
  width: 100%; height: auto; display: block;
}
.result-chart-placeholder {
  padding: 80px 40px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  color: var(--text-dim);
}
.result-chart-placeholder svg { width: 48px; height: 48px; opacity: 0.3; }
.result-chart-placeholder p { font-size: 14px; opacity: 0.6; text-align: center; }

/* 统计卡片条 */
.result-stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}
.result-stat {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  box-shadow: var(--shadow);
}
.result-stat-label { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.result-stat-value { font-size: 20px; font-weight: 700; }
.result-stat-value .unit { font-size: 12px; font-weight: 400; color: var(--text-secondary); margin-left: 3px; }
.result-stat.teal .result-stat-value  { color: var(--teal); }
.result-stat.accent .result-stat-value { color: var(--accent); }
.result-stat.amber .result-stat-value  { color: #f59e0b; }

/* 状态卡片 */
.result-status-card {
  padding: 28px 24px;
  background: var(--bg-card);
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-lg);
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  color: var(--text-dim);
  text-align: center;
}
.result-status-card.done { border-color: rgba(0,201,167,0.3); }
.result-status-card.error { border-color: rgba(255,94,94,0.3); }

/* 覆盖 chart-area 旧样式 */
.chart-area { display: none !important; }

/* 空会话提示 */
.no-session {
  padding: 80px 40px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  color: var(--text-secondary); text-align: center;
}
.no-session svg { width: 56px; height: 56px; opacity: 0.25; }
.no-session h2 { font-size: 20px; font-weight: 600; }
.no-session p { font-size: 14px; max-width: 360px; line-height: 1.6; }
.no-session a {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 11px 24px; background: var(--accent); color: #fff;
  border-radius: 10px; text-decoration: none; font-size: 14px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(var(--accent-rgb),0.35); transition: all 0.18s;
}
.no-session a:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(var(--accent-rgb),0.45); }

/* 环境参数子标签 */
.env-tabs {
  display: flex; gap: 0; background: var(--bg-deep); border: 1px solid var(--border);
  border-radius: 9px; padding: 3px; width: fit-content; margin-bottom: 16px;
}
.env-tab {
  padding: 7px 18px; border-radius: 7px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: none; background: transparent; color: var(--text-secondary); transition: all 0.15s;
}
.env-tab.active { background: var(--bg-card); color: var(--text-primary); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

/* nav badge 动态状态 */
.nav-badge { width: 8px; height: 8px; border-radius: 50%; background: var(--bg-hover); transition: all 0.2s; }
.nav-badge.done { background: var(--teal); box-shadow: 0 0 5px rgba(0,201,167,0.5); }
.nav-badge.skip { background: var(--text-dim); opacity: 0.4; }
.nav-badge.computing { background: var(--accent); animation: badge-pulse 1.4s ease-in-out infinite; }
@keyframes badge-pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

/* 导航下拉 */
.topnav-wrap {
  position: relative;
}
.topnav-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 7px 12px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: all 0.15s;
  font-size: 13px; font-weight: 500; color: var(--text-primary);
}
.topnav-btn:hover { border-color: var(--accent); color: var(--accent); }
.topnav-btn svg { flex-shrink: 0; }
.topnav-caret { transition: transform 0.2s; }
.topnav-wrap.open .topnav-caret { transform: rotate(180deg); }
.topnav-dropdown {
  display: none;
  position: absolute; top: calc(100% + 6px); left: 0;
  min-width: 190px;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 8px 28px rgba(0,0,0,0.14);
  padding: 6px 0; z-index: 999;
}
.topnav-wrap.open .topnav-dropdown { display: block; }
.topnav-section-label {
  padding: 7px 14px 3px;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  color: var(--text-dim); text-transform: uppercase;
}
.topnav-item {
  display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
  padding: 7px 16px;
  font-size: 13px; color: var(--text-secondary);
  background: transparent; border: none; cursor: pointer;
  text-decoration: none;
  transition: all 0.12s;
}
.topnav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.topnav-item.active { color: var(--accent); font-weight: 500; }
.topnav-item-current { color: var(--accent) !important; font-weight: 500; opacity: 0.75; }

/* 项目管理按钮 */
.topnav-mgr-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-secondary); text-decoration: none;
  padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px;
  transition: all 0.15s; background: var(--bg-card);
}
.topnav-mgr-btn:hover, .topnav-mgr-btn.hover { color: var(--accent); border-color: var(--accent); }

/* 计算中占位符 */
.computing-placeholder {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding: 70px 40px; color: var(--accent);
}
.computing-spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(var(--accent-rgb),0.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.computing-label { font-size: 13px; font-weight: 500; letter-spacing: 0.03em; }
.computing-sublabel { font-size: 11px; color: var(--text-secondary); }

/* topbar 左侧导航区 */
.topbar-left { display: flex; align-items: center; gap: 8px; }

/* 顶栏项目标题 */
.topbar-project-title {
  display: inline-flex; align-items: center;
  padding: 4px 10px;
  background: var(--bg-hover); border-radius: 6px;
  font-size: 12px; color: var(--text-secondary);
  max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.workflow-nav { gap: 2px; }
.workflow-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: var(--radius-sm);
  font-size: 13px; color: var(--text-secondary);
  text-decoration: none; background: transparent; border: none;
  width: 100%; cursor: pointer; transition: all 0.12s;
}
.workflow-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.workflow-current {
  background: var(--accent-glow) !important;
  color: var(--accent) !important;
  font-weight: 500;
}
.workflow-active-dot {
  margin-left: auto; width: 6px; height: 6px;
  border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 5px var(--accent);
}

/* 满意度交互柱状图 */
.sat-chart-wrap {
  display: flex; flex-direction: row; width: 100%; align-items: flex-start; gap: 0;
}
.sat-canvas-wrap {
  position: relative; padding: 20px 16px 16px 20px; flex: 1 1 0; min-width: 0;
}
.sat-canvas-title {
  font-size: 12px; font-weight: 600; color: var(--text-secondary);
  margin-bottom: 8px; letter-spacing: 0.03em;
}
.sat-canvas-wrap canvas {
  display: block; width: 100% !important; height: 300px;
  cursor: crosshair;
}
.sat-dist-wrap {
  flex: 0 0 42%; max-width: 42%; padding: 20px 20px 16px 4px;
}
.sat-dist-wrap img { display: block; width: 100%; height: auto; }
#sat-tooltip {
  position: fixed; z-index: 9999; pointer-events: none;
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  font-size: 12px; color: var(--text-primary);
  box-shadow: 0 6px 20px rgba(0,0,0,0.18);
  white-space: nowrap; display: none;
}
#sat-tooltip .tt-id { font-weight: 600; color: var(--accent); margin-bottom: 3px; }
#sat-tooltip .tt-score { color: var(--text-secondary); }

/* ── 保存项目按钮 ── */
.save-project-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 13px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 2px 8px rgba(var(--accent-rgb),0.35);
}
.save-project-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.save-project-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── 指标单独导出按钮 ── */
.metric-actions {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.metric-action-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 11px;
  font-size: 12px; font-weight: 500;
  border-radius: 7px; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-secondary);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.metric-action-btn:hover { border-color: var(--accent); color: var(--accent); }
.metric-action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.metric-action-btn.teal:hover { border-color: var(--teal); color: var(--teal); }
.metric-action-btn.amber:hover { border-color: #f59e0b; color: #f59e0b; }
.metric-action-btn svg { flex-shrink: 0; }

/* ── 保存项目 Modal ── */
.sp-overlay {
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
}
.sp-modal {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 16px; box-shadow: 0 24px 64px rgba(0,0,0,0.3);
  width: 520px; max-width: 95vw; max-height: 88vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.sp-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
}
.sp-header h2 {
  font-size: 16px; font-weight: 700; margin: 0;
  display: flex; align-items: center; gap: 9px;
}
.sp-header h2 svg { color: var(--accent); }
.sp-close {
  background: transparent; border: none; cursor: pointer;
  color: var(--text-secondary); font-size: 18px; padding: 2px 6px;
  border-radius: 6px; transition: all 0.12s;
}
.sp-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.sp-body { padding: 18px 24px; overflow-y: auto; flex: 1; }
.sp-section-label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 10px; margin-top: 16px;
}
.sp-section-label:first-child { margin-top: 0; }

/* 文件夹名输入 */
.sp-input-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg-deep); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 14px;
}
.sp-input-row svg { flex-shrink: 0; color: var(--text-dim); }
.sp-folder-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 13px; color: var(--text-primary);
}

/* 全选控制行 */
.sp-check-ctrl {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.sp-check-ctrl-label { font-size: 12px; color: var(--text-secondary); }
.sp-select-all {
  font-size: 11px; color: var(--accent); cursor: pointer;
  background: none; border: none; padding: 0;
  transition: opacity 0.12s;
}
.sp-select-all:hover { opacity: 0.75; }

/* 指标列表 */
.sp-metric-list {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
}
.sp-metric-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 11px; border-radius: 8px;
  background: var(--bg-deep); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.12s; user-select: none;
}
.sp-metric-item:hover { border-color: rgba(var(--accent-rgb),0.45); }
.sp-metric-item input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
.sp-metric-item.checked { border-color: rgba(var(--accent-rgb),0.5); background: rgba(var(--accent-rgb),0.06); }
.sp-metric-item.unavailable { opacity: 0.3; cursor: not-allowed; }
.sp-metric-badge {
  font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
  background: rgba(var(--accent-rgb),0.12); color: var(--accent);
  white-space: nowrap;
}
.sp-metric-name { font-size: 12px; color: var(--text-primary); flex: 1; }
.sp-metric-item.unavailable .sp-metric-name { color: var(--text-dim); }
.sp-metric-item.unavailable .sp-metric-badge { opacity: 0.4; }
.sp-metric-status-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}
.sp-metric-status-dot.done { background: var(--teal); }
.sp-metric-status-dot.skip { background: var(--text-dim); opacity: 0.4; }

/* 脚注 */
.sp-footer {
  padding: 14px 24px 20px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.sp-count-hint { font-size: 12px; color: var(--text-secondary); }
.sp-footer-btns { display: flex; gap: 10px; }
.sp-btn-cancel {
  padding: 9px 18px; border-radius: 8px;
  background: var(--bg-deep); border: 1px solid var(--border);
  font-size: 13px; color: var(--text-secondary); cursor: pointer;
  transition: all 0.12s;
}
.sp-btn-cancel:hover { border-color: var(--accent); color: var(--accent); }
.sp-btn-save {
  padding: 9px 22px; border-radius: 8px;
  background: var(--accent); color: #fff; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  box-shadow: 0 2px 8px rgba(var(--accent-rgb),0.35);
  transition: all 0.15s; display: flex; align-items: center; gap: 7px;
}
.sp-btn-save:hover { opacity: 0.88; transform: translateY(-1px); }
.sp-btn-save:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
.sp-saving-spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
</style>
</head>
<body>

<!-- ─── 侧边栏 ─── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </div>
    <span class="logo-text"><strong>评价结果</strong></span>
  </div>

  <nav class="sidebar-nav">
    <!-- 定位分析 -->
    <div class="nav-section-label">定位分析</div>
    <button class="nav-item active" data-view="heatmap">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>到访频次</span>
      <div class="nav-badge" id="nbadge-heatmap"></div>
    </button>
    <button class="nav-item" data-view="usetime">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>使用时长</span>
      <div class="nav-badge" id="nbadge-usetime"></div>
    </button>
    <button class="nav-item" data-view="speed">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      <span>移动速率</span>
      <div class="nav-badge" id="nbadge-speed"></div>
    </button>
    <button class="nav-item" data-view="duration">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>停留时长</span>
      <div class="nav-badge" id="nbadge-duration"></div>
    </button>
    <button class="nav-item" data-view="cluster">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><circle cx="16" cy="8" r="3"/><circle cx="12" cy="17" r="3"/><line x1="8" y1="8" x2="16" y2="8"/><line x1="8" y1="8" x2="12" y2="17"/><line x1="16" y1="8" x2="12" y2="17"/></svg>
      <span>空间聚类</span>
      <div class="nav-badge" id="nbadge-cluster"></div>
    </button>
    <button class="nav-item" data-view="density">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="7" r="4"/><path d="M5.5 20a7 7 0 0113 0"/></svg>
      <span>人员密度</span>
      <div class="nav-badge" id="nbadge-density"></div>
    </button>
    <button class="nav-item" data-view="openness">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
      <span>开放程度</span>
      <div class="nav-badge" id="nbadge-openness"></div>
    </button>
    <button class="nav-item" data-view="topology">

<script>
// ════════════════════════════════════════════
//  结果页核心逻辑
// ════════════════════════════════════════════

// ── 指标配置（源文件标签） ──
const SOURCE_FILE_LABEL = {
  img:      { label: '平面图',   icon: '🖼' },
  loc:      { label: '定位数据', icon: '📍' },
  behavior: { label: '行为数据', icon: '👥' },
  env:      { label: '环境数据', icon: '🌡' },
  ques:     { label: '问卷数据', icon: '📋' },
  region:   { label: '区域坐标', icon: '🗺' },
};

const METRIC_SOURCE = {
  heatmap:           ['img', 'loc'],
  usetime:           ['img', 'loc'],
  speed:             ['img', 'loc'],
  duration:          ['img', 'loc'],
  cluster:           ['img', 'loc'],
  density:           ['img', 'loc'],
  openness:          ['img', 'loc', 'region'],
  topology:          ['loc'],
  difference:        ['img', 'loc'],
  trajectory:        ['img', 'loc'],
  environment:       ['img', 'env'],
  behavior_count:    ['img', 'behavior'],
  behavior_duration: ['img', 'behavior'],
  behavior_rate:     ['behavior'],
  behavior_entropy:  ['behavior'],
  utilization:       ['behavior', 'region'],
  satisfaction:      ['ques'],
  satisfaction_region: ['ques'],
};

// 指标显示顺序（与侧边栏一一对应）
const METRIC_ORDER = [
  { id: 'heatmap',            badge: 'A1'  },
  { id: 'usetime',            badge: 'A2'  },
  { id: 'speed',              badge: 'A3'  },
  { id: 'duration',           badge: 'A4'  },
  { id: 'cluster',            badge: 'A5'  },
  { id: 'density',            badge: 'A6'  },
  { id: 'openness',           badge: 'A7'  },
  { id: 'topology',           badge: 'A8'  },
  { id: 'difference',         badge: 'A9'  },
  { id: 'trajectory',         badge: 'A10' },
  { id: 'environment',        badge: 'B5'  },
  { id: 'behavior_count',     badge: 'C1'  },
  { id: 'behavior_duration',  badge: 'C2'  },
  { id: 'behavior_rate',      badge: 'C3'  },
  { id: 'behavior_entropy',   badge: 'C4'  },
  { id: 'utilization',        badge: 'C5'  },
  { id: 'satisfaction',       badge: 'D3'  },
  { id: 'satisfaction_region',badge: 'D4'  },
];

// 会话数据缓存
var _sessionData = null;
var _currentView = 'heatmap';

// ── 读取 URL session id ──
function getSessionId() {
  var m = location.search.match(/[?&]sid=([^&]+)/);
  return m ? m[1] : null;
}

// ── 构建所有面板（空壳） ──
function buildPanels() {
  var container = document.getElementById('panels-container');
  container.innerHTML = '';
  METRIC_ORDER.forEach(function(m) {
    var cfg = VIEWS[m.id];
    if (!cfg) return;
    var sources = METRIC_SOURCE[m.id] || [];
    var sourceBtns = sources.map(function(s) {
      var sf = SOURCE_FILE_LABEL[s];
      // 生成带唯一 ID 的芯片，文件名稍后由 _updateSourceBars() 填充
      return '<button class="source-btn" id="src-chip-' + m.id + '-' + s + '" title="' + sf.label + '" data-source-key="' + s + '" data-metric-id="' + m.id + '" onclick="_openSourceFile(this)" disabled>'
        + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'
        + sf.icon + ' <span class="src-chip-name">' + sf.label + '</span>'
        + '</button>';
    }).join('');

    var panel = document.createElement('div');
    panel.className = 'result-panel';
    panel.id = 'panel-' + m.id;

    // 环境参数需要子参数标签页
    var extraCtrl = '';
    if (m.id === 'environment') {
      extraCtrl = '<div class="env-tabs" id="env-tabs">'
        + '<button class="env-tab active" data-pn="1" onclick="switchEnvParam(this,1)">温度</button>'
        + '<button class="env-tab" data-pn="2" onclick="switchEnvParam(this,2)">湿度</button>'
        + '<button class="env-tab" data-pn="3" onclick="switchEnvParam(this,3)">光照</button>'
        + '<button class="env-tab" data-pn="4" onclick="switchEnvParam(this,4)">风速</button>'
        + '<button class="env-tab" data-pn="5" onclick="switchEnvParam(this,5)">噪声</button>'
        + '</div>';
    }

    panel.innerHTML = ''
      + '<div class="result-panel-header">'
      + '  <div class="result-panel-title-group">'
      + '    <div class="result-panel-title">' + cfg.title + '</div>'
      + '    <div class="result-panel-subtitle">' + cfg.subtitle + '</div>'
      + '    <div class="source-file-bar"><span class="source-label">数据来源：</span>' + sourceBtns + '</div>'
      + '  </div>'
      + '  <div class="metric-actions" id="metric-actions-' + m.id + '">'
      + '    <button class="metric-action-btn teal" id="btn-save-img-' + m.id + '" onclick="saveMetricImg(\'' + m.id + '\')" disabled title="保存图片">'
      + '      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>'
      + '      保存图片'
      + '    </button>'
      + '    <button class="metric-action-btn" id="btn-save-xls-' + m.id + '" onclick="saveMetricXlsx(\'' + m.id + '\')" disabled title="保存 Excel">'
      + '      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>'
      + '      保存 Excel'
      + '    </button>'
      + '    <button class="metric-action-btn amber" id="btn-save-zip-' + m.id + '" onclick="saveMetricZip(\'' + m.id + '\')" disabled title="打包保存 ZIP">'
      + '      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
      + '      保存 ZIP'
      + '    </button>'
      + '  </div>'
      + '</div>'

// ── 填充单个指标的结果 ──
function fillPanel(metricId, data) {
  if (!data) return;

  // ── 整体满意度：交互式 canvas 柱状图 ──
  if (metricId === 'satisfaction' && data.bar_data && data.bar_data.length) {
    var ph  = document.getElementById('chart-ph-satisfaction');
    var sw  = document.getElementById('sat-chart-wrap');
    if (ph) ph.style.display = 'none';
    if (sw) sw.style.display = 'flex';

    // 右侧分布图（matplotlib 生成的右半张图）
    // 后端返回的 image 包含两个子图，我们只取右边那张；但由于 matplotlib 生成完整图
    // 我们把它放到右侧容器显示（会自动裁剪溢出），实际只有宽度40%可见近似右图
    var distImg = document.getElementById('chart-img-satisfaction');
    if (distImg && data.image_dist) {
      distImg.src = 'data:image/png;base64,' + data.image_dist;
      distImg.style.display = 'block';
    }

    // 绘制交互式柱状图
    _drawSatBarChart(data.bar_data);

    // 统计卡片
    var statsEl = document.getElementById('stats-satisfaction');
    var cfg = VIEWS['satisfaction'];
    if (statsEl && cfg && data.summary) {
      statsEl.innerHTML = '';
      (cfg.stats || []).forEach(function(s) {
        var val = (data.summary[s.key] !== undefined && data.summary[s.key] !== null) ? data.summary[s.key] : '—';
        statsEl.insertAdjacentHTML('beforeend',
          '<div class="result-stat ' + (s.cls||'') + '">'
          + '<div class="result-stat-label">' + s.label + '</div>'
          + '<div class="result-stat-value">' + val + '<span class="unit">' + s.unit + '</span></div>'
          + '</div>');
      });
    }
    // 激活导出按钮
    _enableMetricBtns('satisfaction', true, true);
    return;
  }

  var img = document.getElementById('chart-img-' + metricId);
  var ph  = document.getElementById('chart-ph-' + metricId);
  if (data.image) {
    if (img) { img.src = 'data:image/png;base64,' + data.image; img.style.display = 'block'; }
    if (ph)  { ph.style.display = 'none'; }
    _enableMetricBtns(metricId, true, !!data.summary);
  } else if (data.error) {
    if (ph) {
      ph.innerHTML = '<div style="padding:40px;font-size:13px;color:#ef4444;text-align:center;">计算失败：' + data.error + '</div>';
    }
  }

  // 统计卡片
  var statsEl = document.getElementById('stats-' + metricId);
  var cfg = VIEWS[metricId];
  if (statsEl && cfg && data.summary) {
    statsEl.innerHTML = '';
    (cfg.stats || []).forEach(function(s) {
      var val = (data.summary[s.key] !== undefined && data.summary[s.key] !== null) ? data.summary[s.key] : '—';
      statsEl.insertAdjacentHTML('beforeend',
        '<div class="result-stat ' + (s.cls||'') + '">'
        + '<div class="result-stat-label">' + s.label + '</div>'
        + '<div class="result-stat-value">' + val + '<span class="unit">' + s.unit + '</span></div>'
        + '</div>');
    });
  }
  // 无论是否有 summary，只要有 image 就激活图片按钮
  if (data.image) _enableMetricBtns(metricId, true, !!data.summary);
}

// ── 绘制整体满意度交互式柱状图 ──
function _drawSatBarChart(barData) {
  var canvas = document.getElementById('sat-bar-canvas');
  if (!canvas) return;

  // 确保 tooltip 元素存在
  var tooltip = document.getElementById('sat-tooltip');
  if (!tooltip) {
    tooltip = document.createElement('div');
    tooltip.id = 'sat-tooltip';
    tooltip.innerHTML = '<div class="tt-id"></div><div class="tt-score"></div>';
    document.body.appendChild(tooltip);
  }

  // 读取主题（通过 CSS 变量）
  var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  var C = {
    bg:       isDark ? '#0f1117' : '#ffffff',
    grid:     isDark ? '#2d2d3d' : '#e4e7f2',
    avgLine:  '#ff5e5e',
    barHi:    '#7c5cfc',
    barLo:    '#00c9a7',
    text:     isDark ? '#8b8fa8' : '#5a5f7a',
    label:    isDark ? '#c0c0d0' : '#444444',
  };

  var dpr = window.devicePixelRatio || 1;
  var W   = canvas.clientWidth  || canvas.offsetWidth  || 600;
  var H   = 320; // CSS height
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.height = H + 'px';

  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var PAD = { top: 24, right: 20, bottom: 36, left: 48 };
  var chartW = W - PAD.left - PAD.right;
  var chartH = H - PAD.top  - PAD.bottom;

  // 清空
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  var n = barData.length;
  if (n === 0) return;

  var scores  = barData.map(function(d){ return d[1]; });
  var maxScore = Math.max.apply(null, scores);
  var yMax  = Math.ceil(maxScore / 20) * 20 || 100;
  var avg   = scores.reduce(function(a,b){ return a+b; }, 0) / scores.length;

  // y 轴刻度
  ctx.strokeStyle = C.grid;
  ctx.lineWidth   = 0.5;
  ctx.font = '10px sans-serif';
  ctx.fillStyle = C.text;
  ctx.textAlign = 'right';
  var ySteps = 5;
  for (var i = 0; i <= ySteps; i++) {
    var yVal = (yMax / ySteps) * i;
    var yPx  = PAD.top + chartH - (yVal / yMax) * chartH;
    ctx.beginPath(); ctx.moveTo(PAD.left, yPx); ctx.lineTo(PAD.left + chartW, yPx); ctx.stroke();
    ctx.fillText(yVal.toFixed(0), PAD.left - 5, yPx + 3.5);
  }

  // 均值虚线
  var avgY = PAD.top + chartH - (avg / yMax) * chartH;
  ctx.save();
  ctx.setLineDash([5, 4]);
  ctx.strokeStyle = C.avgLine;
  ctx.lineWidth   = 1.5;
  ctx.beginPath(); ctx.moveTo(PAD.left, avgY); ctx.lineTo(PAD.left + chartW, avgY); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = C.avgLine;
  ctx.textAlign = 'left';
  ctx.font = '10px sans-serif';
  ctx.fillText('均值 ' + avg.toFixed(1), PAD.left + chartW + 3, avgY + 4);

  // 柱子
  var barW = Math.max(2, Math.min(24, (chartW / n) * 0.7));
  var gap  = chartW / n;

  // 存储每个柱子的矩形，用于命中检测
  var _bars = [];
  for (var j = 0; j < n; j++) {
    var s     = barData[j][1];
    var bH    = (s / yMax) * chartH;
    var bX    = PAD.left + j * gap + (gap - barW) / 2;
    var bY    = PAD.top  + chartH - bH;
    ctx.fillStyle = s >= avg ? C.barHi : C.barLo;
    ctx.fillRect(bX, bY, barW, bH);
    _bars.push({ x: bX, y: bY, w: barW, h: bH, id: barData[j][0], score: s });
  }

  // 保存 bars 到 canvas 元素，方便鼠标事件访问
  canvas._satBars = _bars;
  canvas._satPad  = PAD;
  canvas._satDpr  = dpr;

  // 绑定鼠标事件（避免重复绑定）
  if (!canvas._satEvtBound) {
    canvas._satEvtBound = true;

    canvas.addEventListener('mousemove', function(e) {
      var rect = canvas.getBoundingClientRect();
      var mx   = e.clientX - rect.left;
      var my   = e.clientY - rect.top;
      var hit  = null;
      var bs   = canvas._satBars || [];
      for (var k = 0; k < bs.length; k++) {
        var b = bs[k];
        // 扩大命中区域：宽度方向宽松一点
        if (mx >= b.x - 2 && mx <= b.x + b.w + 2 &&
            my >= b.y      && my <= b.y + b.h) {
          hit = b; break;
        }
      }
      var tt = document.getElementById('sat-tooltip');
      if (!tt) return;
      if (hit) {
        tt.querySelector('.tt-id').textContent    = '人员编号：' + hit.id;
        tt.querySelector('.tt-score').textContent = '满意度得分：' + hit.score.toFixed(1);
        tt.style.display = 'block';
        tt.style.left    = (e.clientX + 14) + 'px';
        tt.style.top     = (e.clientY - 10) + 'px';
      } else {
        tt.style.display = 'none';
      }
    });

    canvas.addEventListener('mouseleave', function() {
      var tt = document.getElementById('sat-tooltip');
      if (tt) tt.style.display = 'none';
    });
  }
}

// ── 通用：调用原生保存对话框接口 ──
function _callSaveMetric(metricId, fileType, btnId, loadingText) {
  var sid = getSessionId();
  if (!sid) return;
  var btn = document.getElementById(btnId);
  var origHTML = btn ? btn.innerHTML : '';
  if (btn) { btn.disabled = true; btn.innerHTML = loadingText; }

  var url = '/api/save_metric/' + sid + '/' + metricId + '/' + fileType;
  if (metricId === 'environment' && fileType === 'img') {
    var activeEnvBtn = document.querySelector('#env-tabs .env-tab.active');
    var pn = activeEnvBtn ? activeEnvBtn.dataset.pn : '1';
    url += '?pn=' + pn;
  }

  fetch(url, { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.cancelled) return;
      if (data.error) throw new Error(data.error);
      _showSaveSuccess(data.path);
    })
    .catch(function(e) { alert('保存失败：' + e.message); })
    .finally(function() {
      if (btn) { btn.disabled = false; btn.innerHTML = origHTML; }
    });
}

// ── 轮询会话进度 ──
function startPolling(sid) {
  function poll() {
    fetch('/api/session/' + sid)
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.error) {
          stopPolling();
          document.getElementById('no-session').style.display = 'flex';
          document.getElementById('panels-container').style.display = 'none';
          document.getElementById('status-text').textContent = '会话已过期';
          return;
        }

        // 调试：在控制台输出错误详情
        if (data.debug_errors && Object.keys(data.debug_errors).length > 0) {
          console.warn('[SpaceLens] 指标计算错误:', data.debug_errors);
        }

        // 缓存最新会话数据（switchEnvParam 需要）
        _sessionData = data;

        // ── 更新数据来源芯片（只需执行一次，文件名不会变） ──
        if (!_sourceBarsUpdated && data.source_files) {
          _sourceBarsUpdated = true;
          _updateSourceBars(data.source_files);
        }

        // ── 更新顶栏项目标题（folder_name – building_type） ──
        (function() {
          var titleEl = document.getElementById('topbar-project-title');
          var textEl  = document.getElementById('topbar-project-text');
          if (!titleEl || !textEl) return;
          var TYPE_LABELS = {
            office: '办公建筑', education: '教育建筑', medical: '医疗建筑',
            commercial: '商业建筑', cultural: '文化建筑', residential: '居住建筑'
          };
          var folder  = data.folder_name || '';
          var rawType = data.building_type || '';
          var typeLabel = TYPE_LABELS[rawType] || rawType;
          var title = folder && typeLabel ? folder + '  ·  ' + typeLabel
                    : folder || typeLabel;
          if (title) {
            textEl.textContent = title;
            titleEl.style.display = 'inline-flex';
          }
        })();
        var results = data.results || {};
        var computed = data.computed || [];
        var skipped  = data.skipped  || [];

        // ── 渲染新完成的指标 ──
        computed.forEach(function(metricId) {
          if (_renderedMetrics.has(metricId)) return;
          _renderedMetrics.add(metricId);
          // environment_pX → 填充到 environment 面板（当前激活参数）
          if (metricId.indexOf('environment_p') === 0) {
            var activeBtn = document.querySelector('#env-tabs .env-tab.active');
            var activePn = activeBtn ? parseInt(activeBtn.dataset.pn) : 1;
            if (metricId === 'environment_p' + activePn) {
              fillPanel('environment', results[metricId] || {});
            }
            setNavBadge('environment', 'done');
          } else {
            fillPanel(metricId, results[metricId] || {});
            setNavBadge(metricId, 'done');
          }
        });

        // ── 标记跳过的指标 ──
        skipped.forEach(function(metricId) {
          if (_renderedMetrics.has(metricId)) return;
          _renderedMetrics.add(metricId);
          if (metricId.indexOf('environment_p') === 0) {
            // 只在所有 environment_pX 都跳过时才标 skip
            var allSkip = [1,2,3,4,5].every(function(n){
              return skipped.indexOf('environment_p'+n) >= 0;
            });
            if (allSkip) { setNavBadge('environment', 'skip'); markPanelSkipped('environment'); }
          } else {
            setNavBadge(metricId, 'skip');
            markPanelSkipped(metricId);
          }
        });

        // ── 更新状态栏 ──
        var done = computed.length + skipped.length;
        // 后端: 17 个非环境指标 + 5 个 environment_pX = 22 项
        document.getElementById('status-text').textContent =
          '计算中… ' + done + ' / 22 项完成';

        // ── 检查是否全部完成 ──
        if (data.status === 'done') {
          stopPolling();
          document.getElementById('status-text').textContent =
            '全部完成，共 ' + computed.length + ' 项结果';
          // 计算完成后显示保存项目按钮
          var saveBtn = document.getElementById('save-project-btn');
          if (saveBtn && computed.length > 0) saveBtn.style.display = 'inline-flex';
        } else {
          _pollTimer = setTimeout(poll, 1500);
        }
      })
      .catch(function(){
        _pollTimer = setTimeout(poll, 2000);
      });
  }
  poll(); // 立即执行第一次
}

function stopPolling() {
  if (_pollTimer) { clearTimeout(_pollTimer); _pollTimer = null; }
}

// ── 更新所有面板的数据来源芯片（文件名 + 点击打开） ──
var _sourceBarsUpdated = false;
function _updateSourceBars(sourceFiles) {
  if (!sourceFiles) return;
  // sourceFiles = { img: "path/or/name.png", loc: "data.csv", ... }
  // 遍历所有芯片，按 data-source-key 找到对应文件名，更新显示
  document.querySelectorAll('.source-btn[data-source-key]').forEach(function(btn) {
    var key = btn.dataset.sourceKey;
    // SOURCE_FILE_LABEL 的 key 映射到 source_files 的 key
    // METRIC_SOURCE 里用: img, loc, behavior, env, ques, region
    // source_files  里用: img, loc, beh,      env, ques, region
    var sfKey = key === 'behavior' ? 'beh' : key;
    var filePath = sourceFiles[sfKey];
    if (!filePath) return;

    // 只取文件名部分显示（去掉目录）
    var parts = filePath.replace(/\\/g, '/').split('/');
    var fname = parts[parts.length - 1];

    // 更新芯片文字
    var nameSpan = btn.querySelector('.src-chip-name');
    if (nameSpan) nameSpan.textContent = fname;

    // 更新 title tooltip（显示完整路径）
    btn.title = filePath;

    // 有文件名即可点击（桌面端 Qt 已注入绝对路径，后端会处理兜底）
    btn.classList.add('clickable');
    btn.removeAttribute('disabled');
  });
}

// ── 点击数据来源芯片：通知后端打开文件 ──
function _openSourceFile(btn) {
  if (btn.disabled) return;
  var sid = getSessionId();
  if (!sid) return;
  var key = btn.dataset.sourceKey;
  var sfKey = key === 'behavior' ? 'beh' : key;
  fetch('/api/open_source/' + sid + '/' + sfKey, { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.warning) {
        alert('提示：' + d.warning);
      } else if (d.error) {
        alert('无法打开文件：' + d.error);
      }
      // success: 系统文件管理器已打开，无需提示
    })
    .catch(function() {}); // 静默失败
}

    document.getElementById('no-session').style.display = 'flex';
    document.getElementById('panels-container').style.display = 'none';
    document.getElementById('status-text').textContent = '无会话数据';
  }

  // 引擎就绪轮询
  pollEngineReady();
});

function pollEngineReady() {
  fetch('/api/ready')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.ready) { document.getElementById('status-dot').className = 'status-dot online'; }
      else { setTimeout(pollEngineReady, 800); }
    })
    .catch(function(){ setTimeout(pollEngineReady, 1000); });
}

function openSaveModal() {
  if (!_sessionData) return;
  var computed = _sessionData.computed || [];
  var skipped  = _sessionData.skipped  || [];
  var folder   = _sessionData.folder_name || '';

  // 填充文件夹名输入框
  document.getElementById('sp-folder-input').value = folder;

  // 渲染指标复选列表
  var listEl = document.getElementById('sp-metric-list');
  listEl.innerHTML = '';
  METRIC_DISPLAY.forEach(function(m) {
    var isDone      = computed.indexOf(m.id) >= 0;
    var isSkipped   = skipped.indexOf(m.id) >= 0 || (!isDone && computed.length > 0);
    var available   = isDone;
    var dotCls      = isDone ? 'done' : 'skip';

    var item = document.createElement('label');
    item.className = 'sp-metric-item' + (available ? ' checked' : ' unavailable');
    item.dataset.id = m.id;
    item.innerHTML = '<input type="checkbox"' + (available ? ' checked' : ' disabled')
      + ' data-metric="' + m.id + '">'
      + '<span class="sp-metric-badge">' + m.badge + '</span>'
      + '<span class="sp-metric-name">' + m.name + '</span>'
      + '<span class="sp-metric-status-dot ' + dotCls + '"></span>';

    item.querySelector('input').addEventListener('change', function() {
      item.classList.toggle('checked', this.checked);
      updateSaveCount();
    });
    listEl.appendChild(item);
  });

  updateSaveCount();
  document.getElementById('sp-overlay').style.display = 'flex';
  document.getElementById('sp-select-all-btn').textContent = '全不选';
}

function closeSaveModal() {
  document.getElementById('sp-overlay').style.display = 'none';
}

function closeSaveModalOutside(e) {
  if (e.target === document.getElementById('sp-overlay')) closeSaveModal();
}

var _allSelected = true;
function toggleSelectAll() {
  var checkboxes = document.querySelectorAll('#sp-metric-list input[type=checkbox]:not(:disabled)');
  _allSelected = !_allSelected;
  checkboxes.forEach(function(cb) {
    cb.checked = _allSelected;
    cb.closest('.sp-metric-item').classList.toggle('checked', _allSelected);
  });
  document.getElementById('sp-select-all-btn').textContent = _allSelected ? '全不选' : '全选';
  updateSaveCount();
}

function updateSaveCount() {
  var total    = document.querySelectorAll('#sp-metric-list input[type=checkbox]:not(:disabled)').length;
  var selected = document.querySelectorAll('#sp-metric-list input[type=checkbox]:not(:disabled):checked').length;
  document.getElementById('sp-count-hint').textContent = '已选 ' + selected + ' / ' + total + ' 项';
  document.getElementById('sp-save-btn').disabled = selected === 0;
}

function doSaveProject() {
  var sid = getSessionId();
  if (!sid) { alert('无会话 ID，无法导出'); return; }

  var selectedMetrics = [];
  document.querySelectorAll('#sp-metric-list input[type=checkbox]:checked:not(:disabled)').forEach(function(cb) {
    selectedMetrics.push(cb.dataset.metric);
  });
  if (selectedMetrics.length === 0) { alert('请至少选择一项指标'); return; }

  var folderName = document.getElementById('sp-folder-input').value.trim() || '评价项目';

  // 禁用按钮 + 显示加载
  var saveBtn = document.getElementById('sp-save-btn');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<div class="sp-saving-spinner"></div> 打包中…';

  // 调用桌面端保存接口（弹出系统原生保存对话框）
  fetch('/api/save_project/' + sid, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ metrics: selectedMetrics, folder_name: folderName }),
  })
  .then(function(resp) { return resp.json(); })
  .then(function(data) {
    if (data.cancelled) {
      // 用户在对话框中点了"取消"，不做任何提示，仅恢复按钮
      return;
    }
    if (data.error) {
      throw new Error(data.error);
    }
    // 保存成功
    closeSaveModal();
    _showSaveSuccess(data.path);
  })
  .catch(function(err) {
    alert('保存失败：' + err.message);
  })
  .finally(function() {
    saveBtn.disabled = false;
    saveBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 保存到本地';
  });
}

function _showSaveSuccess(filePath) {
  // 在顶栏状态区短暂显示成功提示
  var st = document.getElementById('status-text');
  if (!st) return;
  var old = st.textContent;
  st.textContent = '✓ 已保存至：' + (filePath || '本地文件');
  st.style.color = 'var(--success, #22c55e)';
  setTimeout(function() {
    st.textContent = old;
    st.style.color = '';
  }, 5000);
}
